architecture:
  organization: Velocity Chain
  product: Velocity Chain
  environments:
    - name: local
    - name: development
    - name: staging
    - name: production
  domains:
    - name: runbook
      description: SRE Automation using Stage0 Runbook System for operational automation
      repos:
        - name: runbook_api
          description: Runbook Automation API Server
          template: agile-learning-institute/stage0_template_runbook_api
          publish: make
          type: api
          port: 8383
        - name: runbook_spa
          description: Runbook Automation Single Page Web Application (utility container, not a real repository)
          template: N/A
          type: spa_ref
          port: 8384
    - name: schema
      description: MongoDB Database Configuration and Management.
      repos:
        - name: mongodb_api
          description: MongoDB Configurator API Server
          template: agile-learning-institute/stage0_template_configurator_api
          publish: make
          type: api
          port: 8385
        - name: configurator_spa
          description: MongoDB Configurator SPA (utility container, not a real repository)
          template: N/A
          type: spa_ref 
          port: 8386
    - name: common_code
      description: Shared code used across multiple API or SPA code bases are published to private dependency management libraries (NPM /PYPI).
      repos:
        - name: api_utils
          description: Python PyPI API Utility Library
          template: agile-learning-institute/stage0_template_py_utils
          publish: pipenv
          type: api
          port: 8387
        - name: spa_utils
          description: Vue NPM SPA Utility Library
          template: agile-learning-institute/stage0_template_vue_utils
          publish: npm
          type: spa
          port: 8388
    - name: operations
      description: Daily Operations Command Center - real-time visibility and exception management
      data_domains:
        controls:
          - Alert
          - Warehouse
        creates:
          - Analytics
        consumes:
          - Inventory
          - Shipment
          - Demand
          - Supplier
      repos:
        - name: operations_api
          description: Operations Command Center API Server - real-time monitoring and alerts
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8389
        - name: operations_spa
          description: Operations Command Center Dashboard - real-time supply chain visibility
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8390
    - name: planning
      description: Strategic Planning & Scenario Modeling - forecasting and optimization
      data_domains:
        controls:
          - Scenario
          - Demand
        creates:
          - Optimization
        consumes:
          - Organization
          - Product
          - Supplier
          - Analytics
      repos:
        - name: planning_api
          description: Strategic Planning API Server - scenario modeling and forecasting
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8391
        - name: planning_spa
          description: Strategic Planning SPA - scenario modeling and what-if analysis
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8392
    - name: suppliers
      description: Supplier Relationship & Risk Management - vendor performance and diversification
      data_domains:
        controls:
          - Supplier
        creates: []
        consumes:
          - Organization
          - Product
          - Alert
          - Analytics
      repos:
        - name: suppliers_api
          description: Supplier Management API Server - vendor relationships and risk assessment
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8393
        - name: suppliers_spa
          description: Supplier Management SPA - vendor scorecards and risk monitoring
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8394
    - name: inventory
      description: Inventory Management & Optimization - stock levels and warehouse operations
      data_domains:
        controls:
          - Inventory
          - Product
        creates:
          - Shipment
        consumes:
          - Demand
          - Warehouse
          - Optimization
      repos:
        - name: inventory_api
          description: Inventory Management API Server - stock optimization and warehouse operations
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8395
        - name: inventory_spa
          description: Inventory Management SPA - stock levels and warehouse dashboards
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8396
    - name: analytics
      description: Cost Optimization & Business Intelligence - reports and financial analysis
      data_domains:
        controls:
          - Analytics
        creates: []
        consumes:
          - Organization
          - Supplier
          - Inventory
          - Shipment
          - Optimization
      repos:
        - name: analytics_api
          description: Analytics API Server - business intelligence and cost optimization
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8397
        - name: analytics_spa
          description: Analytics Dashboard SPA - executive dashboards and financial reports
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8398
    - name: integrations
      description: External System Integrations - ERP, WMS, TMS, and third-party data sources
      data_domains:
        controls:
          - Integration
        creates:
          - Inventory
          - Shipment
        consumes:
          - Organization
          - Supplier
          - Product
      repos:
        - name: integrations_api
          description: Integration API Server - external system connections and data sync
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8399
        - name: integrations_spa
          description: Integration Management SPA - system connections and data flow monitoring
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8400